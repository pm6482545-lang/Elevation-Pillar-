<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Resource | Elevation Pillar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --cobalt: #002366; --gold: #D4AF37; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 420px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 6px solid var(--gold); text-align: center; }
        
        .mpesa-header { background: #fdfaf0; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 20px; }
        .file-box { background: #eef4ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed var(--cobalt); }
        
        .input-group { margin: 20px 0; text-align: left; }
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; text-align: center; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }

        .btn-wa { background: #25d366; color: white; text-decoration: none; display: block; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        .btn-unlock { background: var(--cobalt); color: var(--gold); border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        #download-area { display: none; margin-top: 20px; padding: 20px; background: #e8f5e9; border-radius: 10px; border: 2px solid var(--success); }
        .btn-final { background: var(--success); color: white; text-decoration: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <div class="mpesa-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/M-PESA_LOGO-01.svg" alt="M-Pesa" style="width: 80px;">
        <p style="margin: 5px 0; font-weight: bold; font-size: 1.2rem;">0746 357 349</p>
        <p style="margin: 0; font-size: 0.85rem; color: #666;">Name: <strong>PETER MUTUA</strong></p>
    </div>

    <div class="file-box">
        <small style="color: #666; text-transform: uppercase;">Unlocking Resource:</small>
        <div id="file-name" style="font-weight: 800; color: var(--cobalt); margin: 5px 0;">Loading...</div>
        <div style="font-weight: bold; color: var(--success); font-size: 1.1rem;">Ksh 50.00</div>
    </div>

    <a id="whatsapp-link" href="#" class="btn-wa" target="_blank">
        <i class="fab fa-whatsapp"></i> I HAVE PAID (GET CODE)
    </a>

    <div class="input-group">
        <label style="display:block; margin-bottom: 8px; font-size: 0.9rem; font-weight: bold; color: var(--cobalt);">Enter 4-Digit Unlock Code:</label>
        <input type="text" id="unlock-input" placeholder="0000" maxlength="10">
    </div>

    <button class="btn-unlock" onclick="checkCode()">Verify & Download</button>

    <div id="download-area">
        <i class="fas fa-check-circle fa-2x" style="color: var(--success);"></i>
        <h3>Payment Verified!</h3>
        <p style="font-size: 0.85rem; color: #555;">Click the button below to save your file.</p>
        <a id="final-link" href="#" class="btn-final" download>Download Now</a>
    </div>
</div>

<script>
    // 1. Get File Info from URL
    const urlParams = new URLSearchParams(window.location.search);
    const fileName = urlParams.get('file') || "Document.pdf";
    const folder = urlParams.get('folder') || "PRO";
    const myPhone = "254746357349";

    // 2. Display the name nicely
    document.getElementById('file-name').innerText = fileName.replace('.pdf', '').replace(/_/g, ' ');
    
    // 3. Setup WhatsApp link with the NEW PRICE
    document.getElementById('whatsapp-link').href = `https://wa.me/${myPhone}?text=Hello Mr. Peter, I have paid Ksh 50 for ${fileName}. Please send my unlock code.`;

    // 4. Verification Logic
    function checkCode() {
        const input = document.getElementById('unlock-input').value.trim();
        
        // --- YOUR CURRENT ACTIVE CODE ---
        const correctCode = "2026"; 

        if (input === correctCode) {
            document.getElementById('download-area').style.display = 'block';
            
            // Construct the path: /documents/FOLDER/FILE.pdf
            const downloadPath = `documents/${folder}/${fileName}`;
            document.getElementById('final-link').href = downloadPath;
            
            // Hide payment inputs
            document.querySelector('.input-group').style.display = 'none';
            document.querySelector('.btn-unlock').style.display = 'none';
            document.getElementById('whatsapp-link').style.display = 'none';
            
            // Smoothly scroll to the download button
            document.getElementById('download-area').scrollIntoView({ behavior: 'smooth' });
        } else {
            alert("Incorrect code. Please ensure you have paid and received the correct code from Mr. Peter on WhatsApp.");
        }
    }
</script>

</body>
</html>
